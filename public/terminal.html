<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TermLink Mobile</title>
    <link rel="stylesheet" href="terminal.css?v=3">
    <link rel="stylesheet" href="lib/xterm.css">
    <script src="lib/xterm.js"></script>
    <script src="lib/xterm-addon-fit.js"></script>
    <script src="i18n/i18n.js"></script>
    <script src="terminal_shortcut_input.js?v=2"></script>
</head>

<body>
    <div id="app-container">
        <!-- Title Bar -->
        <div id="title-bar">
            <div class="left-controls">
                <button id="btn-menu" class="nav-btn" title="Menu" data-i18n="terminal.btn.menu" data-i18n-attr="title">☰</button>
                <span id="app-title">TermLink</span>
            </div>
            <div class="right-controls">
                <button id="btn-server-manager" class="nav-btn" title="Manage Servers" data-i18n="terminal.btn.manageServers" data-i18n-attr="title">⚙️</button>
                <button id="btn-new-session" class="nav-btn" title="New Session" data-i18n="terminal.btn.newSession" data-i18n-attr="title">+</button>
            </div>
        </div>

        <!-- Sidebar Navigation -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>TermLink</h2>
            </div>

            <div class="sidebar-section">
                <h3 data-i18n="terminal.section.servers">Servers</h3>
                <ul id="sidebar-server-list">
                    <!-- Servers injected here -->
                </ul>
                <button id="btn-sidebar-add-server" class="btn-sidebar-action" data-i18n="terminal.btn.addServer">+ Add Server</button>
            </div>

            <div class="sidebar-section">
                <h3 data-i18n="terminal.section.sessions">Sessions</h3>
                <ul id="session-list">
                    <!-- Session items will be injected here -->
                </ul>
            </div>
        </div>

        <!-- Main Content Area -->
        <div id="main-content">
            <div id="status-overlay"></div>

            <!-- Server Connection Overlay (Initial/Fallback) -->
            <div id="connection-overlay" style="display:none;">
                <h2 data-i18n="terminal.connection.title">Connect to Server</h2>
                <div class="form-group">
                    <label data-i18n="terminal.connection.urlLabel">Server URL</label>
                    <input type="text" id="server-url-input" placeholder="http://192.168.1.100:3000">
                </div>
                <button id="btn-save-connection" class="btn-primary" data-i18n="common.connect">Connect</button>
            </div>

            <!-- Server Manager Modal -->
            <div id="server-manager-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 data-i18n="terminal.server.managementTitle">Server Management</h3>
                        <button id="btn-close-server-manager" class="btn-close">×</button>
                    </div>
                    <div class="modal-body">
                        <ul id="server-list" class="server-list">
                            <!-- Server items injected here -->
                        </ul>
                        <div class="add-server-form">
                            <h4 data-i18n="terminal.server.addTitle">Add New Server</h4>
                            <input type="text" id="new-server-name" placeholder="Name (e.g. Home PC)" data-i18n="terminal.server.namePlaceholder" data-i18n-attr="placeholder">
                            <input type="text" id="new-server-url" placeholder="URL (http://...)" data-i18n="terminal.server.urlPlaceholder" data-i18n-attr="placeholder">
                            <button id="btn-add-server" class="btn-primary" style="width:100%" data-i18n="terminal.server.addBtn">Add Server</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- New Session Modal -->
            <div id="new-session-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 data-i18n="terminal.session.title">New Session</h3>
                        <button id="btn-close-new-session" class="btn-close">×</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group" style="width:100%">
                            <label data-i18n="terminal.session.nameLabel">Session Name</label>
                            <input type="text" id="session-name-input" placeholder="My Terminal" data-i18n="terminal.session.namePlaceholder" data-i18n-attr="placeholder">
                        </div>
                        <div class="form-group" style="width:100%">
                            <label data-i18n="terminal.session.targetServer">Target Server</label>
                            <select id="server-select-input"
                                style="width:100%; padding:10px; background:#1e1e1e; color:white; border:1px solid #444; border-radius:4px;">
                                <!-- Options injected via JS -->
                            </select>
                        </div>
                        <button id="btn-create-session" class="btn-primary" style="width:100%" data-i18n="common.create">Create</button>
                    </div>
                </div>
            </div>

            <div id="input-overlay">
                <textarea id="input-buffer" placeholder="Type command here..." data-i18n="common.inputPlaceholder" data-i18n-attr="placeholder"></textarea>
                <div class="input-controls">
                    <button id="btn-clear" data-i18n="common.clear">Clear</button>
                    <button id="btn-close" data-i18n="common.close">Close</button>
                    <button id="btn-send" data-i18n="common.send">Send</button>
                </div>
            </div>
            <div id="terminal-container"></div>
            <div id="toolbar">
                <!-- Row 1: System & Modifiers -->
                <div class="key-row">
                    <!-- Nav moved to top -->
                    <button class="key" id="btn-paste" title="Paste" data-i18n="common.paste" data-i18n-attr="title">📋</button>
                    <button class="key" data-key="Esc">Esc</button>
                    <button class="key" data-key="Tab">Tab</button>
                    <button class="key" data-key="Ctrl">Ctrl</button>
                    <button class="key" data-key="Alt">Alt</button>
                    <button class="key" id="btn-toggle-input" title="Input Mode" data-i18n="common.inputMode" data-i18n-attr="title">📝</button>
                </div>
                <!-- Row 2: Symbols & Jumps -->
                <div class="key-row">
                    <button class="key" data-key="Home">Home</button>
                    <button class="key" data-key="Up">↑</button>
                    <button class="key" data-key="End">End</button>
                    <button class="key" data-key="PgUp">PgUp</button>
                    <button class="key" data-key="-">-</button>
                    <button class="key" data-key="/">/</button>
                    <button class="key" data-key="|">|</button>
                    <button class="key" data-key="Newline" title="Shift+Enter">⏎</button>
                </div>
                <!-- Row 3: Navigation & Control -->
                <div class="key-row">
                    <button class="key" data-key="Left">←</button>
                    <button class="key" data-key="Down">↓</button>
                    <button class="key" data-key="Right">→</button>
                    <button class="key" data-key="PgDn">PgDn</button>
                    <button class="key" id="btn-ctrl-c" data-key="Ctrl-C" style="color:red;">🛑</button>
                    <button class="key" data-key="Enter" style="flex: 2;">Enter ↵</button>
                </div>
            </div>
        </div>
    </div>
    <script src="terminal.js?v=3"></script>
</body>

</html>
