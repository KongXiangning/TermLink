<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TermLink Terminal</title>
    <link rel="stylesheet" href="terminal_client.css?v=73">
    <link rel="stylesheet" href="lib/xterm.css">
    <script src="lib/xterm.js"></script>
    <script src="lib/xterm-addon-fit.js"></script>
    <script src="i18n/i18n.js"></script>
    <script src="terminal_shortcut_input.js?v=26"></script>
</head>

<body>
    <div id="terminal-shell">
        <div id="terminal-main">
            <div id="status-overlay"></div>
            <div id="terminal-container"></div>
        </div>
        <div id="input-overlay">
            <textarea id="input-buffer" placeholder="Type command here..." data-i18n="common.inputPlaceholder" data-i18n-attr="placeholder"></textarea>
            <div class="input-controls">
                <button id="btn-clear" data-i18n="common.clear">Clear</button>
                <button id="btn-close" data-i18n="common.close">Close</button>
                <button id="btn-send" data-i18n="common.send">Send</button>
            </div>
        </div>
        <div id="toolbar">
            <div class="key-row">
                <button class="key" id="btn-paste" title="Paste" data-i18n="common.paste" data-i18n-attr="title">📋</button>
                <button class="key" data-key="Esc">Esc</button>
                <button class="key" data-key="Tab">Tab</button>
                <button class="key" data-key="Ctrl">Ctrl</button>
                <button class="key" data-key="Alt">Alt</button>
                <button class="key" id="btn-toggle-input" title="Input Mode" data-i18n="common.inputMode" data-i18n-attr="title">📝</button>
            </div>
            <div class="key-row">
                <button class="key" data-key="Home">Home</button>
                <button class="key" data-key="Up">↑</button>
                <button class="key" data-key="End">End</button>
                <button class="key" data-key="PgUp">PgUp</button>
                <button class="key" data-key="-">-</button>
                <button class="key" data-key="/">/</button>
                <button class="key" data-key="|">|</button>
                <button class="key" data-key="Newline" title="Shift+Enter">⏎</button>
            </div>
            <div class="key-row">
                <button class="key" data-key="Left">←</button>
                <button class="key" data-key="Down">↓</button>
                <button class="key" data-key="Right">→</button>
                <button class="key" data-key="PgDn">PgDn</button>
                <button class="key" id="btn-ctrl-c" data-key="Ctrl-C" style="color:red;">🛑</button>
                <button class="key" data-key="Enter" style="flex: 2;">Enter ↵</button>
            </div>
        </div>
    </div>
    <script src="lib/plan_markdown.js?v=1"></script>
    <script src="lib/codex_bootstrap.js?v=2"></script>
    <script src="lib/codex_history_view.js?v=2"></script>
    <script src="lib/codex_shell_view.js?v=1"></script>
    <script src="lib/codex_slash_commands.js?v=2"></script>
    <script src="lib/codex_settings_view.js?v=3"></script>
    <script src="lib/codex_runtime_view.js?v=4"></script>
    <script src="lib/codex_approval_view.js?v=3"></script>
    <script src="terminal_client.js?v=68"></script>
</body>

</html>
