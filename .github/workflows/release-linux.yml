name: Linux Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${VERSION}." >&2
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Run Linux release tests
        run: >-
          node --test
          tests/linuxInstallerConfig.test.js
          tests/releaseLayout.test.js
          tests/directMtlsInstaller.test.js
          tests/nginxMtlsTool.test.js
          tests/tlsConfig.test.js

      - name: Build Linux archive and checksum
        shell: bash
        run: |
          npm run release:build:linux
          cd dist/release-layout
          sha256sum termlink-linux-*.tar.gz > SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          dist/release-layout/termlink-linux-*.tar.gz
          dist/release-layout/SHA256SUMS
          --verify-tag
          --generate-notes
          --title "TermLink ${GITHUB_REF_NAME}"
