apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

import groovy.json.JsonOutput
import java.util.Properties

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream ->
        localProperties.load(stream)
    }
}

def readBuildConfigValue = { String key, String defaultValue ->
    def value = project.findProperty(key)
    if (value == null || value.toString().trim().isEmpty()) {
        value = System.getenv(key)
    }
    if (value == null || value.toString().trim().isEmpty()) {
        value = localProperties.getProperty(key)
    }
    if (value == null || value.toString().trim().isEmpty()) {
        return defaultValue
    }
    return value.toString().trim()
}

def debugServerBaseUrl = readBuildConfigValue('TERMLINK_DEBUG_BASE_URL', '')
def debugServerUsername = readBuildConfigValue('TERMLINK_DEBUG_BASIC_USERNAME', '')
def debugServerPassword = readBuildConfigValue('TERMLINK_DEBUG_BASIC_PASSWORD', '')

android {
    namespace = "com.termlink.app"
    compileSdk = rootProject.ext.compileSdkVersion
    kotlinOptions {
        jvmTarget = "21"
    }
    buildFeatures {
        buildConfig true
        compose true
    }
    composeOptions {
        kotlinCompilerExtensionVersion = rootProject.ext.composeCompilerVersion
    }
    defaultConfig {
        applicationId "com.termlink.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    sourceSets {
        debug {
            assets.srcDirs += ["$buildDir/generated/assets/localDebugConfig/debug"]
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.fragment:fragment-ktx:$androidxFragmentVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
    implementation "androidx.security:security-crypto:1.0.0"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.material:material:1.12.0"
    implementation project(':capacitor-android')

    // Jetpack Compose
    def composeBom = platform('androidx.compose:compose-bom:2024.06.00')
    implementation composeBom
    androidTestImplementation composeBom
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    debugImplementation 'androidx.compose.ui:ui-tooling'
    implementation 'androidx.activity:activity-compose:1.9.3'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.8.7'

    // OkHttp for native WebSocket
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.json:json:20250517"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test:core:1.6.1"
    androidTestImplementation "androidx.test:runner:1.6.1"
    androidTestImplementation "androidx.test:monitor:1.7.1"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    androidTestImplementation "com.squareup.okhttp3:mockwebserver:4.12.0"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// Build a debug-only local config asset. Use an untracked local-debug-config.json or local.properties/env vars.
task prepareDebugLocalConfig {
    outputs.file(layout.buildDirectory.file('generated/assets/localDebugConfig/debug/local-debug-config.json'))
    doLast {
        def outputFile = layout.buildDirectory.file('generated/assets/localDebugConfig/debug/local-debug-config.json').get().asFile
        def localConfigFile = rootProject.file('local-debug-config.json')
        if (localConfigFile.exists()) {
            outputFile.parentFile.mkdirs()
            outputFile.text = localConfigFile.getText('UTF-8')
            return
        }

        if (!debugServerBaseUrl) {
            outputFile.delete()
            return
        }

        outputFile.parentFile.mkdirs()

        def profileId = 'local-debug-default'
        def authType = (debugServerUsername && debugServerPassword) ? 'BASIC' : 'NONE'
        def payload = [
            profiles: [[
                id: profileId,
                name: 'Local Debug Server',
                baseUrl: debugServerBaseUrl,
                terminalType: 'TERMLINK_WS',
                authType: authType,
                basicUsername: debugServerUsername,
                mtlsEnabled: false,
                allowedHosts: ''
            ]],
            activeProfileId: profileId,
            basicCredentials: authType == 'BASIC'
                ? [(profileId): debugServerPassword]
                : [:]
        ]
        outputFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(payload))
    }
}

task removeLegacyLocalDebugConfig(type: Delete) {
    delete file('src/main/assets/local-debug-config.json')
}

tasks.matching { it.name == 'preBuild' }.configureEach {
    dependsOn removeLegacyLocalDebugConfig
}

tasks.matching { it.name == 'mergeDebugAssets' || it.name == 'processDebugMainResources' }.configureEach {
    dependsOn prepareDebugLocalConfig
}
